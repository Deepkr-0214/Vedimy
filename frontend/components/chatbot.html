<div id="vedimy-chatbot-container" class="chatbot-hidden">
    <div class="chatbot-window" style="border-radius:20px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); box-shadow:0 10px 40px rgba(0,0,0,0.5);">
        <div class="chatbot-header" style="background: linear-gradient(135deg, #1e293b, #0f172a); border-bottom:1px solid rgba(255,255,255,0.05); padding:1rem 1.2rem;">
            <div class="chatbot-title" style="display:flex; align-items:center; gap:0.75rem;">
                <div class="chatbot-logo" style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg, #3b82f6, #8b5cf6);display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 12px rgba(59,130,246,0.3);">
                    ✨
                </div>
                <div>
                    <h4 style="margin:0;font-family:'Syne',sans-serif;font-size:1.1rem;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Vedimy AI</h4>
                    <span class="chatbot-status" style="font-size:0.75rem;color:#34d399;display:flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;background:#34d399;border-radius:50%;display:inline-block;"></span>Online</span>
                </div>
            </div>
            <button id="chatbot-close-btn" class="chatbot-action-btn" style="background:transparent;border:none;color:#94a3b8;font-size:1.2rem;cursor:pointer;transition:color 0.2s;">
                ✕
            </button>
        </div>
        
        <div class="chatbot-messages" id="chatbot-messages" style="background:rgba(15,23,42,0.95); padding:1rem; display:flex; flex-direction:column; gap:1rem;">
            <div class="chatbot-message bot-message" style="display:flex; gap:0.75rem;">
                <div class="message-avatar" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg, #3b82f6, #8b5cf6);display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;">✨</div>
                <div class="message-content" style="background:rgba(255,255,255,0.05);padding:0.75rem 1rem;border-radius:0 12px 12px 12px;font-size:0.9rem;color:#e2e8f0;line-height:1.4;">
                    <p style="margin:0;">Hello! I am Vedimy AI. I can answer questions about the platform, exam rules, or summarize lectures.</p>
                </div>
            </div>
        </div>
        
        <div class="chatbot-typing-indicator" id="chatbot-typing-indicator" style="display: none; padding:0.5rem 1rem; background:rgba(15,23,42,0.95);">
            <div style="display:flex; gap:4px; align-items:center; background:rgba(255,255,255,0.05); padding:0.5rem 0.75rem; border-radius:12px; width:fit-content;">
                <span style="width:6px;height:6px;background:#60a5fa;border-radius:50%;animation:pulse 1s infinite;"></span>
                <span style="width:6px;height:6px;background:#60a5fa;border-radius:50%;animation:pulse 1s infinite 0.2s;"></span>
                <span style="width:6px;height:6px;background:#60a5fa;border-radius:50%;animation:pulse 1s infinite 0.4s;"></span>
            </div>
        </div>

        <div class="chatbot-options" style="background:rgba(15,23,42,0.95); padding:0.5rem 1rem; border-top:1px solid rgba(255,255,255,0.05);">
            <button id="tawk-connect-btn" style="width:100%;background:linear-gradient(135deg, #3b82f6, #8b5cf6);border:none;color:white;border-radius:12px;padding:0.75rem;font-size:0.9rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.5rem;box-shadow:0 4px 12px rgba(59,130,246,0.25);">
                💬 Talk to Agent
            </button>
        </div>

        <div class="chatbot-input-area" style="background:#0f172a; padding:0.75rem 1rem; border-top:1px solid rgba(255,255,255,0.05);">
            <form id="chatbot-form" style="display:flex; gap:0.5rem;">
                <input type="text" id="chatbot-input" placeholder="Ask Vedimy AI..." autocomplete="off" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:0.6rem 1rem;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;">
                <button type="submit" id="chatbot-send-btn" style="background:linear-gradient(135deg, #3b82f6, #6366f1);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;flex-shrink:0;transition:transform 0.2s;">
                    ➤
                </button>
            </form>
        </div>
    </div>
</div>

<button id="chatbot-floating-btn" class="chatbot-floating-btn" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg, #3b82f6, #8b5cf6);border:none;color:white;font-size:1.5rem;box-shadow:0 8px 24px rgba(59,130,246,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;">
    ✨
    <span class="chatbot-tooltip" style="position:absolute;right:70px;background:#1e293b;color:white;padding:0.4rem 0.8rem;border-radius:8px;font-size:0.8rem;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;">Ask Vedimy AI</span>
</button>
