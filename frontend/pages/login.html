<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vedimy - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <style>
    .form-container {
      display: flex; justify-content: center; align-items: center; min-height: 80vh;
    }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); }
    .form-group input[type="email"], .form-group input[type="password"], .form-group input[type="text"] { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-secondary); color: white; }
    .radio-group { display: flex; gap: 1.5rem; margin-top: 0.5rem; }
    .radio-label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-primary); }
    .radio-label input { width: auto; cursor: pointer; }
    .checkbox-group { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-secondary); margin-bottom: 1.5rem; }
    .btn-row { display: flex; gap: 1rem; }
    .btn-danger { background: var(--accent-danger); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-face { background: var(--icon-blue-bg); color: var(--accent-primary); border: 1px solid var(--accent-primary); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 1rem; transition: all 0.2s; }
    .btn-face:hover { background: var(--accent-primary); color: white; }
    #video-container { display: none; flex-direction: column; align-items: center; }
    #login-webcam { width: 100%; max-width: 300px; border-radius: 8px; border: 2px solid var(--accent-primary); transform: scaleX(-1); margin-bottom: 1rem; }
  </style>
  <link rel="stylesheet" href="../styles/chatbot.css">
</head>
<body>
  <div id="navbar-root"></div>
  <main class="main-layout form-container">
    <div class="glass-card" style="width: 100%; max-width: 420px; text-align: center;">
      <!-- Guest welcome banner -->
      <div id="guest-banner" style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.22);border-radius:10px;padding:0.75rem 1rem;margin-bottom:1.5rem;text-align:left;display:flex;gap:0.75rem;align-items:flex-start;">
        <span style="font-size:1.4rem;flex-shrink:0;">🎓</span>
        <div>
          <div style="font-weight:700;font-size:0.9rem;color:#60a5fa;margin-bottom:2px;">Guest Access</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);line-height:1.45;">Sign in with your registered email &amp; password, or use <strong>Face Login</strong> for instant access. New guest? <a href="/pages/register.html" style="color:#60a5fa;font-weight:600;">Create an account</a>.</div>
        </div>
      </div>
      <h2 style="margin-bottom: 2rem;">Welcome Back</h2>
      <form id="login-form">
        <div class="form-group">
          <label>Role *</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="role" value="host" required> Host
            </label>
            <label class="radio-label">
              <input type="radio" name="role" value="guest" checked required> Guest
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" placeholder="Mobile No. / Email" required>
        </div>
        <div class="form-group" style="margin-bottom:0.5rem;">
          <label>Password *</label>
          <input type="password" id="password" placeholder="Password" required>
        </div>
        <label class="checkbox-group">
          <input type="checkbox" id="show-password"> Show Password
        </label>
        <div class="btn-row">
          <button type="submit" class="btn-primary" style="flex:1;">Login</button>
          <button type="button" class="btn-danger" style="flex:1;" onclick="showToast('Forgot password functionality coming soon', 'info')">Forgot Password</button>
        </div>
        <button type="button" class="btn-face" id="btn-face-login">👤 Login with Face Recognition</button>
      </form>
      <p style="margin-top:1rem;color:var(--text-secondary);font-size:0.875rem;">
        New to Vedimy? <a href="/pages/register.html" style="color:var(--accent-primary);font-weight:600;">Create Account</a>
        &nbsp;·&nbsp;
        <a href="/pages/join.html" style="color:var(--accent-primary);font-weight:600;">Join a Room</a>
      </p>
      
      <div id="video-container">
        <h3 style="margin-bottom: 1rem; color: var(--text-primary);">Look at the camera</h3>
        <video id="login-webcam" autoplay playsinline muted></video>
        <div class="btn-row" style="width: 100%;">
          <button type="button" class="btn-primary" id="btn-capture-face" style="flex:1;">Verify Face</button>
          <button type="button" class="btn-danger" id="btn-cancel-face" style="flex:1;">Cancel</button>
        </div>
      </div>
    </div>
  </main>
  <div id="toast-container"></div>
  <script type="module">
    import { api } from '../js/core/api.js';
    import { AppState } from '../js/core/state.js';
    import { showToast } from '../js/components/toast.js';
    import '../js/components/navbar.js';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';
      try {
        const selectedRole = document.querySelector('input[name="role"]:checked').value;
        const res = await api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          role: selectedRole
        }, false);
        AppState.setAuth(res.user, res.access_token);
        // Redirect guest back to room join if they came from join page
        const params = new URLSearchParams(window.location.search);
        const nextPath = params.get('next');
        if (nextPath) { window.location.href = nextPath; return; }
        if (!res.user.face_registered) {
          window.location.href = '/pages/face-setup.html';
        } else {
          window.location.href = '/pages/dashboard.html';
        }
      } catch (err) {
        showToast(err.message, 'error');
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });

    // Show/hide guest banner based on role selection
    document.querySelectorAll('input[name="role"]').forEach(r => {
      r.addEventListener('change', () => {
        const isGuest = document.querySelector('input[name="role"]:checked').value === 'guest';
        document.getElementById('guest-banner').style.display = isGuest ? 'flex' : 'none';
      });
    });

    document.getElementById('show-password').addEventListener('change', (e) => {
      document.getElementById('password').type = e.target.checked ? 'text' : 'password';
    });

    const faceBtn = document.getElementById('btn-face-login');
    const form = document.getElementById('login-form');
    const videoContainer = document.getElementById('video-container');
    const video = document.getElementById('login-webcam');
    let stream = null;

    faceBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      if (!email) {
        showToast('Please enter your email first to use face login', 'warning');
        return;
      }
      form.style.display = 'none';
      videoContainer.style.display = 'flex';
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
      } catch (e) {
        showToast('Camera access denied', 'error');
        cancelFaceLogin();
      }
    });

    function cancelFaceLogin() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      videoContainer.style.display = 'none';
      form.style.display = 'block';
    }

    document.getElementById('btn-cancel-face').addEventListener('click', cancelFaceLogin);

    document.getElementById('btn-capture-face').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const role = document.querySelector('input[name="role"]:checked').value;
      
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const base64Image = canvas.toDataURL('image/jpeg', 0.8);

      document.getElementById('btn-capture-face').textContent = 'Verifying...';
      document.getElementById('btn-capture-face').disabled = true;

      try {
        const res = await api.post('/auth/login/face', { email, role, image: base64Image }, false);
        cancelFaceLogin();
        AppState.setAuth(res.user, res.access_token);
        window.location.href = '/pages/dashboard.html';
      } catch (err) {
        showToast(err.message || 'Face login failed', 'error');
        document.getElementById('btn-capture-face').textContent = 'Verify Face';
        document.getElementById('btn-capture-face').disabled = false;
      }
    });
  </script>

</body>
</html>
