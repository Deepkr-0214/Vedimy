<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedimy - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <!-- Cropper.js CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <style>
    .form-container { display:flex; justify-content:center; align-items:center; min-height:80vh; padding: 2rem 0; }
    .form-group { margin-bottom:1.25rem; text-align:left; }
    .form-group label { display:block; margin-bottom:0.4rem; color:var(--text-secondary); font-size:0.875rem; }
    .form-group input, .form-group select { width:100%; padding:0.75rem; border-radius:8px; border:1px solid var(--border); background:var(--bg-secondary); color:white; font-size:1rem; }
    .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent-primary); }
    .error-msg { color:var(--accent-danger); text-align:center; margin-top:0.75rem; font-size:0.875rem; }
    .link { color:var(--accent-primary); cursor:pointer; }
    
    /* Photo Selection Area */
    .photo-area {
      border: 2px dashed var(--border); border-radius: 8px; padding: 1.5rem; text-align: center;
      background: rgba(255,255,255,0.02); transition: border-color 0.2s;
    }
    .photo-area:hover { border-color: var(--accent-primary); }
    .photo-actions { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1rem; }
    
    .final-preview {
      width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
      margin: 0 auto 1rem auto; border: 3px solid var(--accent-primary); display: none;
    }

    /* Modals */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
      display: none; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-card {
      background: var(--bg-card); border-radius: 12px; width: 100%; max-width: 500px;
      padding: 1.5rem; border: 1px solid var(--border);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-header h3 { margin: 0; font-size: 1.2rem; }
    .close-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
    
    /* Camera Modal */
    #camera-video { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; object-fit: cover; transform: scaleX(-1); margin-bottom: 1rem; }
    
    /* Cropper Modal */
    .img-container { width: 100%; max-height: 400px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
    .img-container img { max-width: 100%; display: block; }
  </style>
</head>
<body>
  <div id="navbar-root"></div>
  <main class="main-layout form-container">
    <div class="glass-card" style="width:100%;max-width:440px;text-align:center;">
      <h2 style="margin-bottom:1.75rem;">Create Account</h2>
      <form id="register-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label>I am a</label>
          <select id="role">
            <option value="guest">Guest</option>
            <option value="host">Host</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Face Biometric (Required)</label>
          <div class="photo-area" id="photo-area">
            <img id="final-preview" class="final-preview" src="" alt="Face Preview" />
            <p id="photo-instruction" style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:1rem;">
              Provide a clear photo of your face for secure platform access.
            </p>
            <div class="photo-actions">
              <button type="button" class="btn-primary" id="open-camera-btn" style="flex:1; padding:0.6rem; font-size:0.9rem;">📸 Take Photo</button>
              <button type="button" class="btn-primary" id="trigger-upload-btn" style="flex:1; background:transparent; border:1px solid var(--border); color:var(--text-primary); padding:0.6rem; font-size:0.9rem;">📁 Upload</button>
            </div>
            <input type="file" id="file-upload" accept="image/*" style="display:none;">
          </div>
        </div>

        <div class="form-group" style="margin-top: 1rem; display: flex; align-items: flex-start; gap: 0.5rem; text-align: left;">
          <input type="checkbox" id="privacy-consent" required style="width: auto; margin-top: 0.25rem;">
          <label for="privacy-consent" style="font-size: 0.8rem; line-height: 1.4; color: var(--text-secondary);">
            I consent to the collection and processing of my biometric data for secure platform access, in accordance with the Privacy Policy.
          </label>
        </div>

        <button type="submit" class="btn-primary" style="width:100%;margin-top:0.5rem;" id="submit-btn">Create Account</button>
      </form>
      <p id="error-msg" class="error-msg" style="display:none;"></p>
      <p style="margin-top:1rem;color:var(--text-secondary);font-size:0.875rem;">
        Already have an account? <a href="/pages/login.html" class="link">Sign in</a>
      </p>
    </div>
  </main>

  <!-- Camera Modal -->
  <div class="modal-overlay" id="camera-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Take Photo</h3>
        <button type="button" class="close-btn" id="close-camera">&times;</button>
      </div>
      <video id="camera-video" autoplay playsinline muted></video>
      <button type="button" class="btn-primary" id="snap-btn" style="width:100%; padding:0.8rem; font-size:1rem;">Capture Frame</button>
    </div>
  </div>

  <!-- Cropper Modal -->
  <div class="modal-overlay" id="cropper-modal">
    <div class="modal-card" style="max-width: 600px;">
      <div class="modal-header">
        <h3>Customize Photo</h3>
        <button type="button" class="close-btn" id="close-cropper">&times;</button>
      </div>
      <p style="color:var(--text-secondary); font-size:0.85rem; margin-bottom:1rem;">Drag and zoom to perfectly center your face.</p>
      <div class="img-container">
        <img id="cropper-image" src="" alt="Crop preview" />
      </div>
      <button type="button" class="btn-primary" id="save-crop-btn" style="width:100%; padding:0.8rem; font-size:1rem; background:var(--accent-success);">Save Photo</button>
    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Cropper.js Script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <script type="module">
    import { api } from '../js/core/api.js';
    import { showToast } from '../js/components/toast.js';
    import '../js/components/navbar.js';

    // State
    let finalBase64Image = null;
    let cameraStream = null;
    let cropper = null;

    // Elements
    const fileUpload = document.getElementById('file-upload');
    const finalPreview = document.getElementById('final-preview');
    const photoInstruction = document.getElementById('photo-instruction');
    const openCameraBtn = document.getElementById('open-camera-btn');
    const triggerUploadBtn = document.getElementById('trigger-upload-btn');
    
    // Camera Modal Elements
    const cameraModal = document.getElementById('camera-modal');
    const cameraVideo = document.getElementById('camera-video');
    const snapBtn = document.getElementById('snap-btn');
    const closeCameraBtn = document.getElementById('close-camera');

    // Cropper Modal Elements
    const cropperModal = document.getElementById('cropper-modal');
    const cropperImage = document.getElementById('cropper-image');
    const saveCropBtn = document.getElementById('save-crop-btn');
    const closeCropperBtn = document.getElementById('close-cropper');

    // --- UPLOAD LOGIC ---
    triggerUploadBtn.addEventListener('click', () => fileUpload.click());
    fileUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        openCropper(event.target.result);
      };
      reader.readAsDataURL(file);
      // Reset input so same file can be selected again
      fileUpload.value = '';
    });

    // --- CAMERA LOGIC ---
    openCameraBtn.addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        cameraVideo.srcObject = cameraStream;
        cameraModal.style.display = 'flex';
      } catch (e) {
        showToast('Camera access denied or unavailable. Please upload a photo.', 'error');
      }
    });

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      cameraModal.style.display = 'none';
    }

    closeCameraBtn.addEventListener('click', stopCamera);

    snapBtn.addEventListener('click', () => {
      const canvas = document.createElement('canvas');
      canvas.width = cameraVideo.videoWidth;
      canvas.height = cameraVideo.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(cameraVideo, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      
      stopCamera();
      openCropper(dataUrl);
    });

    // --- CROPPER LOGIC ---
    function openCropper(imageSrc) {
      cropperImage.src = imageSrc;
      cropperModal.style.display = 'flex';
      
      if (cropper) cropper.destroy();
      
      cropper = new Cropper(cropperImage, {
        aspectRatio: 1, // Square crop for faces
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 0.8,
        restore: false,
        guides: true,
        center: true,
        highlight: false,
        cropBoxMovable: false,
        cropBoxResizable: false,
        toggleDragModeOnDblclick: false,
      });
    }

    function closeCropper() {
      if (cropper) { cropper.destroy(); cropper = null; }
      cropperModal.style.display = 'none';
    }

    closeCropperBtn.addEventListener('click', closeCropper);

    saveCropBtn.addEventListener('click', () => {
      if (!cropper) return;
      
      // Get cropped canvas
      const canvas = cropper.getCroppedCanvas({
        width: 400,
        height: 400,
        fillColor: '#fff',
        imageSmoothingEnabled: true,
        imageSmoothingQuality: 'high',
      });
      
      finalBase64Image = canvas.toDataURL('image/jpeg', 0.9);
      
      // Update UI
      finalPreview.src = finalBase64Image;
      finalPreview.style.display = 'block';
      photoInstruction.style.display = 'none';
      openCameraBtn.textContent = '📸 Retake';
      triggerUploadBtn.textContent = '📁 Change';
      
      closeCropper();
    });

    // --- FORM SUBMIT LOGIC ---
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');
      errEl.style.display = 'none';
      
      if (!finalBase64Image) {
        errEl.textContent = 'Please provide a face photo before creating your account.';
        errEl.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Analyzing face & creating account...';

      try {
        await api.post('/auth/register', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          role: document.getElementById('role').value,
          image: finalBase64Image
        }, false);
        
        showToast('Account created! Redirecting to sign in...', 'success');
        setTimeout(() => window.location.href = '/pages/login.html', 1500);
      } catch(err) {
        errEl.textContent = err.message || 'Registration failed. Please check your photo.';
        errEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
