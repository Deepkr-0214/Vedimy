<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedimy - Cloud Storage</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/globals.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/pages/storage.css">

</head>
<body>
  <div class="sidebar-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="nav-brand" style="font-size:1.5rem;color:var(--accent-primary);">Vedimy</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/pages/dashboard.html" class="sidebar-link"><span>📊</span> Dashboard</a>
        <a href="/pages/security-activity.html" class="sidebar-link"><span>🛡</span> Security & Activity</a>
        <a href="/pages/learning-hub.html" class="sidebar-link"><span>📚</span> Learning Hub</a>
        <a href="/pages/ai-teaching.html" class="sidebar-link"><span>🧠</span> AI Studio</a>
        <a href="/pages/analytics.html" class="sidebar-link"><span>📈</span> Analytics & Reports</a>
        <a href="/pages/storage.html" class="sidebar-link active"><span>☁️</span> Cloud Storage</a>
        <a href="/pages/coordinator.html" class="sidebar-link"><span>👁</span> Monitor Exams</a>
      </nav>
      <div style="padding: 1rem;">
        <button id="logout-btn" class="sidebar-link" style="width:100%; border:none; background:transparent; cursor:pointer; color:var(--accent-danger);">
          <span>🚪</span> Logout
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <h2 style="font-size:1.2rem;">Cloud Storage Vault</h2>
      </header>

      <div class="content-area dash-layout">
        <div class="upload-area" id="upload-area">
          <div class="file-icon" style="margin-bottom:1rem;color:var(--accent-primary);">📁</div>
          <h3>Drag & Drop Files Here</h3>
          <p>Or click to browse from your device. Supported: PDF, Video, JSON.</p>
          <input type="file" id="file-input" style="display:none;" />
        </div>

        <h3 style="margin-bottom:1.5rem;font-size:1.1rem;font-weight:600;">Your Files</h3>
        <div class="files-grid" id="files-grid">
          <div style="color:var(--text-secondary);">Loading files...</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="../js/core/state.js"></script>
  <script type="module" src="../js/core/api.js"></script>
  <script type="module" src="../js/components/toast.js"></script>
  <script type="module" src="../js/pages/storage.js"></script>
</body>
</html>
